resources:
  jobs:
    citibike_etl_pipeline_nb:
      name: citibike_etl_pipeline_nb
      tasks:
        - task_key: 01_bronze_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/01_bronze/01_bronze_citibike.ipynb
            base_parameters:
              pipeline_id: "{{job.id}}"
              run_id: "{{job.run_id}}"
              task_id: "{{task.run_id}}"
              processed_timestamp: "{{job.start_time.iso_datetime}}"
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: standard_ds3_v2_sn
          libraries:
            - whl: /Workspace/Users/jjenvie@gmail.com/dab_project-0.0.1-py3-none-any.whl
        - task_key: 02_silver_citibike
          depends_on:
            - task_key: 01_bronze_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/02_silver/02_silver_citibike.ipynb
            base_parameters:
              pipeline_id: "{{job.id}}"
              run_id: "{{job.run_id}}"
              task_id: "{{task.run_id}}"
              processed_timestamp: "{{job.start_time.iso_datetime}}"
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: standard_ds3_v2_sn
        - task_key: 03_gold_citibike_daily_ride_summary
          depends_on:
            - task_key: 02_silver_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/03_gold/03_gold_citibike_daily_ride_summary.ipynb
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: standard_ds3_v2_sn
        - task_key: 03_gold_citibike_daily_station
          depends_on:
            - task_key: 02_silver_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/03_gold/03_gold_citibike_daily_station.ipynb
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: standard_ds3_v2_sn
      job_clusters:
        - job_cluster_key: standard_ds3_v2_sn
          new_cluster: "${var.standard_ds3_v2_sn}"
      queue:
        enabled: true