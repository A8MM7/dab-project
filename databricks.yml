# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 9ec56c84-cc11-42fe-9265-175fb574c3ba

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: citibike_dev

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    variables:
      catalog: citibike_dev
    default: true
    workspace:
      host: https://adb-7405605494013833.13.azuredatabricks.net
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    variables:
      catalog: citibike_test
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405618979612138.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/jjenvie@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: jjenvie@gmail.com
        level: CAN_MANAGE
  prod:
    mode: production
    variables:
      catalog: citibike_prod
    workspace:
      host: https://adb-7405619632379905.5.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/jjenvie@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: jjenvie@gmail.com
        level: CAN_MANAGE